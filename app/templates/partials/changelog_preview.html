<div class="bg-gray-50 border border-gray-200 rounded-xl p-5">
  <div class="flex items-center justify-between mb-3">
    <h3 class="font-medium text-gray-900 text-sm">Preview — {{ changelog.version }}</h3>
    <span class="text-xs text-gray-400">Draft · not published yet</span>
  </div>
  <div class="prose text-sm" id="preview-md-{{ changelog.id }}"></div>
  <script>document.getElementById("preview-md-{{ changelog.id }}").innerHTML = marked.parse(`{{ changelog.content_md | replace('`', '\\`') | replace('\n', '\\n') }}`);</script>
  <div class="mt-4 pt-4 border-t border-gray-200">
    <button hx-post="/projects/{{ project.id }}/changelogs/{{ changelog.id }}/publish"
      hx-target="#changelog-result" hx-swap="innerHTML"
      class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-xs font-medium hover:bg-indigo-500 transition-colors">
      ✓ Publish
    </button>
  </div>
</div>
