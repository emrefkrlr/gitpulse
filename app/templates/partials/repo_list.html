<div class="space-y-0 max-h-80 overflow-y-auto border border-gray-200 rounded-lg divide-y divide-gray-100">
  {% for repo in repos %}
  <form hx-post="/dashboard/projects" hx-target="#repo-list" hx-swap="innerHTML"
    class="flex items-center justify-between px-4 py-2.5 hover:bg-gray-50">
    <input type="hidden" name="repo_full_name" value="{{ repo.full_name }}" />
    <div>
      <p class="text-sm font-medium text-gray-800">{{ repo.full_name }}</p>
      {% if repo.description %}<p class="text-xs text-gray-400 truncate max-w-xs">{{ repo.description }}</p>{% endif %}
    </div>
    <button type="submit" class="text-xs text-indigo-600 font-medium border border-indigo-200 px-3 py-1 rounded-lg hover:bg-indigo-50 transition-colors shrink-0">Connect</button>
  </form>
  {% endfor %}
</div>
