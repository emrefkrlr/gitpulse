<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}GitPulse{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .prose h2 { font-size: 1.1rem; font-weight: 600; margin: 1rem 0 0.5rem; }
    .prose ul { list-style: disc; padding-left: 1.25rem; }
    .prose li { margin: 0.25rem 0; font-size: 0.9rem; color: #374151; }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-block; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="h-full bg-white text-gray-900">

{% if user is defined and user %}
<nav class="border-b border-gray-100 px-6 py-3 flex items-center justify-between">
  <a href="/dashboard" class="flex items-center gap-2 font-semibold text-gray-900">
    <svg class="w-5 h-5 text-indigo-600" fill="currentColor" viewBox="0 0 20 20"><path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zm0 6a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1v-2zm0 6a1 1 0 011-1h6a1 1 0 010 2H4a1 1 0 01-1-1z"/></svg>
    GitPulse
  </a>
  <div class="flex items-center gap-4 text-sm">
    <a href="/dashboard" class="text-gray-500 hover:text-gray-900">Dashboard</a>
    <a href="/pricing" class="text-gray-500 hover:text-gray-900">Pricing</a>
    <div class="flex items-center gap-2">
      {% if user.avatar_url %}<img src="{{ user.avatar_url }}" class="w-7 h-7 rounded-full" />{% endif %}
      <span class="text-gray-700 font-medium">{{ user.username }}</span>
      <span class="text-xs px-2 py-0.5 rounded-full font-medium
        {% if user.plan.value == 'pro' %}bg-violet-100 text-violet-700
        {% elif user.plan.value == 'starter' %}bg-blue-100 text-blue-700
        {% else %}bg-gray-100 text-gray-500{% endif %}">
        {{ user.plan.value }}
      </span>
    </div>
    <a href="/auth/logout" class="text-gray-400 hover:text-gray-700 text-xs">Logout</a>
  </div>
</nav>
{% endif %}

<main class="{% block main_class %}max-w-4xl mx-auto px-6 py-10{% endblock %}">
  {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}
</body>
</html>
